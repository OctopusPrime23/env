[appearance]

[appearance.text]
font_name = "JetBrainsMono Nerd Font"
font_size = 12.0
notebook_font_size = 14.0

[appearance.window]
zoom_level = 100

[appearance.vertical_tabs]
enabled = false

[appearance.themes]
theme = "fancy_dracula"

[appearance.icon]
app_icon = "original"

[session]

[session.new_session_shell_override]
executable = "/bin/zsh"

[workflows]
show_global_workflows_in_universal_search = true

[agents]
cloud_conversation_storage_enabled = false

[agents.profiles]
agent_mode_execute_readonly_commands = true
agent_mode_coding_permissions = "always_allow_reading"

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.input]
nld_in_terminal_enabled = false
ai_auto_detection_enabled = false

[text_editing]
vim_unnamed_system_clipboard = true
vim_mode_enabled = true

[privacy]
telemetry_enabled = true
crash_reporting_enabled = true
custom_secret_regex_list = [{ pattern = "password.*" }]

[privacy.secret_redaction]
enabled = false

[terminal]
osc52_clipboard_access = "read_write"

[terminal.input]
input_box_type_setting = "universal"

[terminal.input.extra_meta_keys]
left_alt = true
right_alt = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = false
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true

[code]

[code.indexing]
agent_mode_codebase_context = false

[warpify]

[warpify.ssh]
ssh_extension_install_mode = "never_install"
